name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        working-directory: frontend
        run: pnpm lint

      - name: Type-check frontend
        working-directory: frontend
        run: pnpm typecheck

      - name: Test frontend
        working-directory: frontend
        run: pnpm test

      - name: Build frontend
        working-directory: frontend
        run: pnpm build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: hunin_test
          POSTGRES_USER: hunin
          POSTGRES_PASSWORD: hunin
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hunin -d hunin_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.mod

      - name: Test backend
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgres://hunin:hunin@localhost:5432/hunin_test?sslmode=disable
        run: go test ./...

      - name: Vet backend
        working-directory: backend
        run: go vet ./...

      - name: Build backend
        working-directory: backend
        run: go build ./...
